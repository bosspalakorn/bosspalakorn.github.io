            } else {

                              {tenant.status === 'Active' ? 
                                <span className="flex items-center text-xs text-emerald-600 font-medium"><span className="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>ใช้งานปกติ</span> :
                                <span className="flex items-center text-xs text-red-600 font-medium"><span className="w-2 h-2 rounded-full bg-red-500 mr-2"></span>หมดอายุ</span>
                              }
                            </td>
                            <td className="px-6 py-4 text-right">
                              <button className="text-gray-400 hover:text-indigo-600"><Settings className="w-5 h-5"/></button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // ============================================================================
        // 3. COMPONENT ระดับ RESTAURANT APP (แอปจัดการร้านของจริง)
        // ============================================================================

        function RestaurantApp({ user, onLogout }) {
          const isOwner = user.role === 'owner';
          
          const [activeTab, setActiveTab] = useState(isOwner ? 'dashboard' : 'transactions'); 
          const [notification, setNotification] = useState({ show: false, message: '', type: 'success' });

          const [inventory, setInventory] = useState(initialInventory);
          const [transactions, setTransactions] = useState(initialTransactions);
          const [sales, setSales] = useState(initialSales);
          const [staffList, setStaffList] = useState(initialStaffList);
          const [menus, setMenus] = useState(initialFoodCost); 
          
          const [filterMonth, setFilterMonth] = useState('2026-03');
          const [dashboardView, setDashboardView] = useState('month'); 
          const [dashboardDate, setDashboardDate] = useState('2026-03-13');

          const [txType, setTxType] = useState('receive');
          const [txItemId, setTxItemId] = useState('');
          const [txQty, setTxQty] = useState('');
          const [txNote, setTxNote] = useState('');

          const [saleDate, setSaleDate] = useState('2026-03-13');
          const [saleInputType, setSaleInputType] = useState('menu'); 
          const [saleMenuId, setSaleMenuId] = useState('');
          const [saleQty, setSaleQty] = useState('');
          const [saleBulkAmount, setSaleBulkAmount] = useState('');

          const [financeTab, setFinanceTab] = useState('daily'); 
          const [dailyReportDate, setDailyReportDate] = useState('2026-03-13');
          const [reportStaffFilter, setReportStaffFilter] = useState(''); 

          const [showEditMinModal, setShowEditMinModal] = useState(false);
          const [editingMinItem, setEditingMinItem] = useState(null);
          const [tempMinValue, setTempMinValue] = useState('');
          
          const [showAddItemModal, setShowAddItemModal] = useState(false);
          const [newItem, setNewItem] = useState({ name: '', unit: '', min: '', price: '', image: '' });

          const [showAddMenuModal, setShowAddMenuModal] = useState(false);
          const [newMenuData, setNewMenuData] = useState({ menu: '', price: '', recipe: [] });

          const [itemToDelete, setItemToDelete] = useState(null); 
          const [showStaffModal, setShowStaffModal] = useState(false);
          const [newStaffName, setNewStaffName] = useState('');

          const showToast = (message, type = 'success') => {
            setNotification({ show: true, message, type });
            setTimeout(() => setNotification({ show: false, message: '', type: 'success' }), 3000);
          };

          const openEditMin = (item) => {
            setEditingMinItem(item);
            setTempMinValue(item.min.toString());
            setShowEditMinModal(true);
          };

          const handleSaveMin = (e) => {
            e.preventDefault();
            if (!editingMinItem || tempMinValue === '') return;
            const updatedInventory = inventory.map(i => i.id === editingMinItem.id ? { ...i, min: parseFloat(tempMinValue) } : i);
            setInventory(updatedInventory);
            setShowEditMinModal(false);
            showToast('อัปเดตจุดสั่งซื้อเรียบร้อย');
          };

          const handleAddItemSubmit = (e) => {
            e.preventDefault();
            if (!newItem.name || !newItem.unit) return;
            const newItemObj = {
              id: Date.now(),
              name: newItem.name,
              unit: newItem.unit,
              min: parseFloat(newItem.min) || 0,
              price: parseFloat(newItem.price) || 0,
              balance: 0,
              image: newItem.image || null
            };
            setInventory([...inventory, newItemObj]);
            setShowAddItemModal(false);
            setNewItem({ name: '', unit: '', min: '', price: '', image: '' });
            showToast('เพิ่มวัตถุดิบใหม่เข้าระบบสำเร็จ');
          };

          const confirmDeleteItem = () => {
            if (!itemToDelete) return;
            setInventory(inventory.filter(i => i.id !== itemToDelete.id));
            setItemToDelete(null);
            showToast('ลบรายการวัตถุดิบออกจากระบบแล้ว', 'error');
          };

          const handleSaveMenu = (e) => {
            e.preventDefault();
            if (!newMenuData.menu || !newMenuData.price) return;
            const formattedRecipe = newMenuData.recipe.map(r => ({
                itemId: parseInt(r.itemId), qty: parseFloat(r.qty)
            })).filter(r => !isNaN(r.itemId) && !isNaN(r.qty));

            setMenus([...menus, {
                id: Date.now(), menu: newMenuData.menu, price: parseFloat(newMenuData.price), recipe: formattedRecipe
            }]);
            setShowAddMenuModal(false);
            setNewMenuData({ menu: '', price: '', recipe: [] });
            showToast('เพิ่มเมนูใหม่และผูกสูตรสำเร็จ!');
          };

          const handleTransactionSubmit = (e) => {
            e.preventDefault();
            if (!txItemId || !txQty) {
                showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
                return;
            }
            const qty = parseFloat(txQty);
            const item = inventory.find(i => i.id === parseInt(txItemId));
            if (!item) return;

            const updatedInventory = inventory.map(i => {
              if (i.id === item.id) {
                let newBalance = i.balance;
                if (txType === 'receive') newBalance += qty;
                else if (txType === 'issue' || txType === 'waste') newBalance -= qty;
                return { ...i, balance: newBalance };
              }
              return i;
            });

            setInventory(updatedInventory);
            const newTx = {
              id: Date.now(), type: txType, date: new Date().toISOString().split('T')[0],
              itemId: item.id, qty: qty, person: user.name, note: txNote
            };
            setTransactions([newTx, ...transactions]);
            setTxItemId(''); setTxQty(''); setTxNote('');
            showToast(`บันทึกสำเร็จ ระบบอัปเดตสต๊อกแล้ว`);
          };

          const handleSaleSubmit = (e) => {
            e.preventDefault();
            if (!saleDate) return;
            let newSale;

            if (saleInputType === 'menu') {
              if (!saleMenuId || !saleQty) return;
              const menu = menus.find(m => m.id === parseInt(saleMenuId));
              if (!menu) return;
              newSale = { id: Date.now(), date: saleDate, menuId: menu.id, qty: parseFloat(saleQty), amount: menu.price * parseFloat(saleQty), type: 'menu' };
            } else {
              if (!saleBulkAmount) return;
              newSale = { id: Date.now(), date: saleDate, menuId: null, qty: null, amount: parseFloat(saleBulkAmount), type: 'bulk' };
            }
            
            setSales([...sales, newSale].sort((a, b) => b.date.localeCompare(a.date)));
            setSaleMenuId(''); setSaleQty(''); setSaleBulkAmount('');
            showToast(`บันทึกยอดขายสำเร็จ!`);
          };

          const handleAddStaff = (e) => {
            e.preventDefault();
            if (!newStaffName.trim()) return;
            const newStaff = { id: Date.now(), name: newStaffName.trim() };
            setStaffList([...staffList, newStaff]);
            setNewStaffName('');
            showToast('เพิ่มชื่อพนักงานสำเร็จ');
          };

          const handleDeleteStaff = (id) => {
            setStaffList(staffList.filter(s => s.id !== id));
            showToast('ลบรายชื่อพนักงานแล้ว', 'error');
          };

          const filteredSales = useMemo(() => {
            if (dashboardView === 'month') return sales.filter(s => s.date.startsWith(filterMonth));
            return sales.filter(s => s.date === dashboardDate);
          }, [sales, filterMonth, dashboardView, dashboardDate]);

          const filteredTransactions = useMemo(() => {
            if (dashboardView === 'month') return transactions.filter(t => t.date.startsWith(filterMonth));
            return transactions.filter(t => t.date === dashboardDate);
          }, [transactions, filterMonth, dashboardView, dashboardDate]);

          const totalRevenue = useMemo(() => filteredSales.reduce((sum, item) => sum + item.amount, 0), [filteredSales]);

          const costBreakdown = useMemo(() => {
            let issueCost = 0, wasteCost = 0;
            filteredTransactions.forEach(tx => {
              if (tx.type === 'issue' || tx.type === 'waste') {
                const item = inventory.find(i => i.id === tx.itemId);
                const cost = tx.qty * (item?.price || 0);
                if (tx.type === 'issue') issueCost += cost;
                if (tx.type === 'waste') wasteCost += cost;
              }
            });
            return { issue: issueCost, waste: wasteCost, total: issueCost + wasteCost };
          }, [filteredTransactions, inventory]);

          const totalProfit = totalRevenue - costBreakdown.total;
          const profitMargin = totalRevenue > 0 ? ((totalProfit / totalRevenue) * 100).toFixed(1) : 0;
          const totalStockValue = useMemo(() => inventory.reduce((sum, item) => sum + (item.balance * item.price), 0), [inventory]);
          const lowStockItems = useMemo(() => inventory.filter(item => item.balance <= item.min), [inventory]);

          const chartData = useMemo(() => {
            const dailyData = {};
            const targetMonth = dashboardView === 'month' ? filterMonth : dashboardDate.substring(0, 7);
            const monthSales = sales.filter(s => s.date.startsWith(targetMonth));
            const monthTx = transactions.filter(t => t.date.startsWith(targetMonth));

            monthSales.forEach(s => {
              const day = s.date.split('-')[2];
              if (!dailyData[day]) dailyData[day] = { date: `${day}/${s.date.split('-')[1]}`, revenue: 0, cost: 0, profit: 0 };
              dailyData[day].revenue += s.amount;
            });

            monthTx.forEach(tx => {
              if (tx.type === 'issue' || tx.type === 'waste') {
                const day = tx.date.split('-')[2];
                const item = inventory.find(i => i.id === tx.itemId);
                if (!dailyData[day]) dailyData[day] = { date: `${day}/${tx.date.split('-')[1]}`, revenue: 0, cost: 0, profit: 0 };
                dailyData[day].cost += tx.qty * (item?.price || 0);
              }
            });

            Object.values(dailyData).forEach(day => day.profit = day.revenue - day.cost);
            return Object.values(dailyData).sort((a, b) => a.date.localeCompare(b.date));
          }, [sales, transactions, inventory, dashboardView, filterMonth, dashboardDate]);

          const aiInsights = useMemo(() => {
            const insights = [];
            const periodText = dashboardView === 'month' ? 'เดือนนี้' : 'วันนี้';
            const daysInPeriod = dashboardView === 'month' ? 30 : 1;

            const menuSalesVolume = {};
            filteredSales.forEach(s => { if (s.menuId && s.type === 'menu') menuSalesVolume[s.menuId] = (menuSalesVolume[s.menuId] || 0) + s.qty; });

            const bestSellerMenuId = Object.keys(menuSalesVolume).sort((a,b) => menuSalesVolume[b] - menuSalesVolume[a])[0];
            if (bestSellerMenuId) {
                const bestMenu = menus.find(m => m.id === parseInt(bestSellerMenuId));
                if (bestMenu) {
                    insights.push({
                        id: 'best_seller', type: 'success', icon: <Award className="w-5 h-5 text-emerald-500" />,
                        title: 'เมนูยอดฮิต (Best Seller)', message: `${periodText} "${bestMenu.menu}" ขายดีที่สุดถึง ${menuSalesVolume[bestSellerMenuId]} จาน!`
                    });
                }
            }

            if (dashboardView === 'month') {
                const expectedIngredientUsage = {};
                Object.keys(menuSalesVolume).forEach(menuId => {
                    const menu = menus.find(m => m.id === parseInt(menuId));
                    if (menu && menu.recipe) {
                        menu.recipe.forEach(r => expectedIngredientUsage[r.itemId] = (expectedIngredientUsage[r.itemId] || 0) + (r.qty * menuSalesVolume[menuId]));
                    }
                });

                Object.keys(expectedIngredientUsage).forEach(itemId => {
                    const item = inventory.find(i => i.id === parseInt(itemId));
                    if (item) {
                        const dailyAvgUsage = expectedIngredientUsage[itemId] / daysInPeriod;
                        const recommendedMin = Math.ceil(dailyAvgUsage * 4); 
                        if (recommendedMin > item.min * 1.5 && dailyAvgUsage > 0.5) {
                            insights.push({
                                id: `adjust_min_${itemId}`, type: 'info', icon: <BrainCircuit className="w-5 h-5 text-blue-500" />,
                                title: `AI แนะนำ: ปรับขั้นต่ำ "${item.name}"`, message: `คุณใช้ ${item.name} เฉลี่ยวันละ ${dailyAvgUsage.toFixed(1)} ${item.unit} แนะนำให้ปรับขั้นต่ำเป็น ${recommendedMin} ${item.unit}`
                            });
                        }
                    }
                });
                
                const overstockItems = inventory.filter(i => i.balance >= i.min * 3 && i.min > 0);
                if (overstockItems.length > 0) {
                  insights.push({
                    id: 'overstock', type: 'info', icon: <TrendingDown className="w-5 h-5 text-blue-500" />,
                    title: 'ควรชะลอการสั่ง (ระวังเงินจม)', message: `พบวัตถุดิบสต๊อกล้น ได้แก่ ${overstockItems.map(i=>i.name).join(', ')} แนะนำให้เน้นระบายของเดิม`
                  });
                }
            }

            if (lowStockItems.length > 0) {
              insights.push({
                id: 'stock_low', type: 'warning', icon: <Package className="w-5 h-5 text-orange-500" />,
                title: 'ควรสั่งเพิ่มด่วน (สต๊อกใกล้หมด)', message: `มีวัตถุดิบ ${lowStockItems.length} รายการ ต่ำกว่าเกณฑ์ แนะนำให้สั่งซื้อด่วน`
              });
            }

            const wasteByItem = {};
            filteredTransactions.forEach(tx => {
                if (tx.type === 'waste') {
                    if(!wasteByItem[tx.itemId]) wasteByItem[tx.itemId] = { qty: 0, cost: 0 };
                    const item = inventory.find(i => i.id === tx.itemId);
                    wasteByItem[tx.itemId].qty += tx.qty;
                    wasteByItem[tx.itemId].cost += tx.qty * (item?.price || 0);
                }
            });
            
            const topWasteItemId = Object.keys(wasteByItem).sort((a,b) => wasteByItem[b].cost - wasteByItem[a].cost)[0];
            if (topWasteItemId && wasteByItem[topWasteItemId].cost > 0) {
                 const topWasteItem = inventory.find(i => i.id === parseInt(topWasteItemId));
                 insights.push({
                    id: 'specific_waste', type: 'danger', icon: <Trash2 className="w-5 h-5 text-red-500" />,
                    title: `ระวัง! ทิ้ง "${topWasteItem.name}" เยอะเกินไป`, message: `${periodText}คุณทิ้ง ${topWasteItem.name} ไปสูญเงิน ฿${wasteByItem[topWasteItemId].cost}`
                 });
            }

            if (insights.length === 0) {
               insights.push({ id: 'all_good', type: 'success', icon: <CheckCircle2 className="w-5 h-5 text-emerald-500" />, title: 'ทุกอย่างเป็นปกติ', message: 'ระบบไม่พบความผิดปกติของสต๊อกหรือต้นทุน' });
            }

            return insights;
          }, [lowStockItems, costBreakdown, totalRevenue, profitMargin, inventory, filteredTransactions, dashboardView, menus, filteredSales]);

          const renderDashboard = () => (
            <div className="space-y-6 pb-20">
              <div className="bg-white rounded-xl p-3 shadow-sm border border-gray-100 space-y-3">
                <div className="flex border border-emerald-200 rounded-lg overflow-hidden">
                  <button onClick={() => setDashboardView('month')} className={`flex-1 py-2 text-sm font-medium transition-colors ${dashboardView === 'month' ? 'bg-emerald-500 text-white' : 'bg-emerald-50 text-emerald-600'}`}>สรุปรายเดือน</button>
                  <button onClick={() => setDashboardView('day')} className={`flex-1 py-2 text-sm font-medium transition-colors ${dashboardView === 'day' ? 'bg-emerald-500 text-white' : 'bg-emerald-50 text-emerald-600'}`}>สรุปรายวัน</button>
                </div>
                <div className="flex items-center justify-between pt-1">
                  <div className="flex items-center text-gray-600 font-medium"><Calendar className="w-5 h-5 mr-2 text-emerald-500" /> {dashboardView === 'month' ? 'เลือกเดือน:' : 'เลือกวันที่:'}</div>
                  {dashboardView === 'month' ? 
                    <input type="month" value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)} className="bg-gray-50 border border-gray-200 rounded-lg p-2 outline-none" /> : 
                    <input type="date" value={dashboardDate} onChange={(e) => setDashboardDate(e.target.value)} className="bg-gray-50 border border-gray-200 rounded-lg p-2 outline-none" />
                  }
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div className="bg-white p-4 rounded-xl shadow-sm"><div className="text-xs text-gray-500 mb-1">มูลค่าสต๊อกคงเหลือ</div><div className="text-xl font-bold">฿{totalStockValue.toLocaleString()}</div></div>
                <div className="bg-white p-4 rounded-xl shadow-sm"><div className="text-xs text-gray-500 mb-1">วัตถุดิบใกล้หมด</div><div className="text-xl font-bold text-red-500">{lowStockItems.length} <span className="text-sm font-normal text-gray-500">รายการ</span></div></div>
              </div>

              <div className="bg-gray-900 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                <div className="absolute -right-4 -top-4 opacity-10"><PieChart className="w-32 h-32" /></div>
                <h2 className="text-sm font-medium text-gray-300 mb-1">กำไรสุทธิเบื้องต้น</h2>
                <div className="text-4xl font-black mb-1 text-emerald-400">฿{totalProfit.toLocaleString()}</div>
                <div className="text-xs text-emerald-200/70 mb-6 bg-emerald-900/30 w-fit px-2 py-1 rounded-lg">คิดเป็น {profitMargin}% ของยอดขาย</div>
                <div className="space-y-3 border-t border-gray-700 pt-4">
                  <div className="flex justify-between items-center text-sm"><span className="text-gray-300 flex items-center"><TrendingUp className="w-4 h-4 mr-2 text-blue-400"/> ยอดขายรวม</span><span className="font-bold text-white">฿{totalRevenue.toLocaleString()}</span></div>
                  <div className="flex justify-between items-center text-sm"><span className="text-gray-300 flex items-center"><Package className="w-4 h-4 mr-2 text-orange-400"/> ต้นทุนเบิก</span><span className="font-semibold text-orange-400">- ฿{costBreakdown.issue.toLocaleString()}</span></div>
                  <div className="flex justify-between items-center text-sm"><span className="text-gray-300 flex items-center"><Trash2 className="w-4 h-4 mr-2 text-red-400"/> ต้นทุนของเสีย</span><span className="font-semibold text-red-400">- ฿{costBreakdown.waste.toLocaleString()}</span></div>
                </div>
              </div>

              <div className="bg-blue-50 rounded-xl p-5 shadow-sm border border-blue-100 relative overflow-hidden">
                <h3 className="text-indigo-800 font-bold mb-4 text-sm flex items-center"><Sparkles className="w-5 h-5 mr-2 text-indigo-500" /> RESTCHEF AI วิเคราะห์</h3>
                <div className="space-y-3 relative z-10">
                  {aiInsights.map((insight) => (
                    <div key={insight.id} className="bg-white/80 p-3 rounded-lg flex items-start shadow-sm">
                      <div className={`p-2 rounded-full mr-3 shrink-0 ${insight.type === 'danger' ? 'bg-red-50' : insight.type === 'warning' ? 'bg-orange-50' : insight.type === 'info' ? 'bg-blue-50' : 'bg-emerald-50'}`}>{insight.icon}</div>
                      <div>
                        <h4 className={`text-sm font-bold mb-0.5 ${insight.type === 'danger' ? 'text-red-700' : insight.type === 'warning' ? 'text-orange-700' : insight.type === 'info' ? 'text-blue-700' : 'text-emerald-700'}`}>{insight.title}</h4>
                        <p className="text-xs text-gray-600 leading-relaxed">{insight.message}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              
              <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                <h3 className="text-gray-800 font-semibold mb-4 text-sm">แนวโน้มยอดขาย vs กำไร</h3>
                <div className="h-56 w-full">
                  <ResponsiveContainer width="100%" height="100%">
                    <BarChart data={chartData} margin={{ top: 10, right: 0, left: -20, bottom: 0 }}>
                      <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f0f0f0" />
                      <XAxis dataKey="date" axisLine={false} tickLine={false} tick={{fontSize: 10, fill: '#888'}} />
                      <YAxis axisLine={false} tickLine={false} tick={{fontSize: 10, fill: '#888'}} />
                      <Tooltip formatter={(value) => `฿${value}`} />
                      <Legend wrapperStyle={{ fontSize: '12px' }} />
                      <Bar dataKey="revenue" name="ยอดขาย" fill="#3b82f6" radius={[4, 4, 0, 0]} />
                      <Bar dataKey="profit" name="กำไร" fill="#10b981" radius={[4, 4, 0, 0]} />
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
            </div>
          );

          const renderInventory = () => (
            <div className="space-y-4 pb-20">
              <div className="relative">
                <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5" />
                <input type="text" placeholder="ค้นหาวัตถุดิบ..." className="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none" />
              </div>

              {isOwner && (
                <button onClick={() => setShowAddItemModal(true)} className="w-full py-3 bg-emerald-50 text-emerald-600 border border-emerald-200 border-dashed rounded-xl font-medium flex items-center justify-center hover:bg-emerald-100">
                  <PlusCircle className="w-5 h-5 mr-2" /> เพิ่มวัตถุดิบใหม่เข้าระบบ
                </button>
              )}

              <div className="space-y-3">
                {inventory.map(item => {
                  const isLow = item.balance <= item.min;
                  return (
                    <div key={item.id} className={`bg-white rounded-xl p-4 shadow-sm border-l-4 ${isLow ? 'border-red-500' : 'border-emerald-500'} relative`}>
                      {isOwner && (
                        <button onClick={() => setItemToDelete(item)} className="absolute top-4 right-4 text-red-400 bg-red-50 p-1.5 rounded-full"><Trash2 className="w-4 h-4" /></button>
                      )}
                      
                      <div className="flex items-center space-x-3 mb-3 pr-10">
                        {item.image ? (
                          <img src={item.image} alt={item.name} className="w-14 h-14 rounded-lg object-cover border border-gray-100 shadow-sm" />
                        ) : (
                          <div className="w-14 h-14 rounded-lg bg-gray-50 border border-gray-100 flex items-center justify-center text-gray-300">
                             <ImageIcon className="w-6 h-6" />
                          </div>
                        )}
                        <div>

                        </div>
                        {isOwner && (
                          <>

                              <div className="text-gray-500 text-[10px] mb-1">ราคา/หน่วย</div><div className="font-semibold text-gray-800">฿{item.price}</div>
                            </div>
                            <div className="bg-emerald-50 p-2 rounded-lg text-center border border-emerald-100">
                              <div className="text-emerald-600 text-[10px] mb-1">มูลค่ารวม</div><div className="font-bold text-emerald-700">฿{(item.balance * item.price).toLocaleString()}</div>
                            </div>
                          </>
                        )}
                      </div>
                    </div>
                  );
                })}

            </div>
          );

          const renderTransactions = () => (
            <div className="space-y-6 pb-20">
              <div className="flex bg-gray-100 p-1 rounded-xl">
                <button onClick={() => setTxType('receive')} className={`flex-1 py-2 text-sm font-medium rounded-lg ${txType === 'receive' ? 'bg-white shadow-sm text-emerald-600' : 'text-gray-500'}`}><ShoppingBag className="w-4 h-4 inline mr-1" /> รับเข้า</button>
                <button onClick={() => setTxType('issue')} className={`flex-1 py-2 text-sm font-medium rounded-lg ${txType === 'issue' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}><ArrowRightLeft className="w-4 h-4 inline mr-1" /> เบิกใช้</button>
                <button onClick={() => setTxType('waste')} className={`flex-1 py-2 text-sm font-medium rounded-lg ${txType === 'waste' ? 'bg-white shadow-sm text-red-600' : 'text-gray-500'}`}><Trash2 className="w-4 h-4 inline mr-1" /> ของเสีย</button>
              </div>

              <form onSubmit={handleTransactionSubmit} className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 space-y-4">
                <h3 className="font-semibold text-gray-800 flex items-center"><PlusCircle className="w-5 h-5 mr-2 text-emerald-500" /> บันทึกรายการ</h3>
                <div>
                  <label className="block text-sm text-gray-600 mb-1">เลือกวัตถุดิบ <span className="text-red-500">*</span></label>
                  <select required value={txItemId} onChange={(e) => setTxItemId(e.target.value)} className="w-full p-3 rounded-xl border border-gray-200 outline-none bg-white">
                    <option value="">-- เลือกรายการ --</option>
                    {inventory.map(item => <option key={item.id} value={item.id}>{item.name} (เหลือ: {item.balance} {item.unit})</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div><label className="block text-sm text-gray-600 mb-1">จำนวน <span className="text-red-500">*</span></label><input type="number" required min="0.1" step="any" value={txQty} onChange={(e) => setTxQty(e.target.value)} className="w-full p-3 rounded-xl border border-gray-200 outline-none" placeholder="0.00" /></div>
                  <div><label className="block text-sm text-gray-600 mb-1">ผู้บันทึก</label><input type="text" disabled value={user.name} className="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-500" /></div>
                </div>
                <div>
                  <label className="block text-sm text-gray-600 mb-1">หมายเหตุ (ถ้ามี)</label>
                  <input type="text" value={txNote} onChange={(e) => setTxNote(e.target.value)} className="w-full p-3 rounded-xl border border-gray-200 outline-none" placeholder="รายละเอียดเพิ่มเติม" />
                </div>
                <button type="submit" className={`w-full py-3 rounded-xl text-white font-medium ${txType === 'receive' ? 'bg-emerald-500' : txType === 'issue' ? 'bg-blue-500' : 'bg-red-500'}`}>บันทึกข้อมูล</button>
              </form>
              
              <div>
                <h3 className="font-semibold text-gray-800 mb-3 ml-1 text-sm">ประวัติล่าสุดวันนี้</h3>
                <div className="space-y-2">
                  {transactions.slice(0, 5).map(tx => {
                    const item = inventory.find(i => i.id === tx.itemId);
                    return (
                      <div key={tx.id} className="bg-white p-3 rounded-xl flex items-center justify-between border border-gray-100">
                        <div className="flex items-center">
                          <div className={`p-2 rounded-full mr-3 ${tx.type === 'receive' ? 'bg-emerald-100 text-emerald-600' : tx.type === 'waste' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}`}>
                            {tx.type === 'receive' ? <TrendingUp className="w-4 h-4" /> : tx.type === 'waste' ? <Trash2 className="w-4 h-4" /> : <TrendingDown className="w-4 h-4" />}
                          </div>
                          <div>
                            <div className="text-sm font-semibold text-gray-800">{item?.name || 'ไม่ระบุ'}</div>
                            <div className="text-[10px] text-gray-500">{tx.date} • {tx.person}</div>
                            {tx.note && <div className="text-[10px] text-gray-400 mt-0.5 italic">"{tx.note}"</div>}
                          </div>
                        </div>
                        <div className={`font-bold ${tx.type === 'receive' ? 'text-emerald-500' : tx.type === 'waste' ? 'text-red-500' : 'text-blue-500'}`}>
                          {tx.type === 'receive' ? '+' : '-'}{tx.qty} <span className="text-xs font-normal">{item?.unit}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );

          const renderFinance = () => {
            const dailySalesList = sales.filter(s => s.date === dailyReportDate);
            const dailyTxList = transactions.filter(t => t.date === dailyReportDate);

            const dailyRev = dailySalesList.reduce((sum, s) => sum + s.amount, 0);
            
            let dailyIssueCost = 0;
            let dailyWasteCost = 0;
            let dailyReceiveValue = 0;

            const enrichedDailyTx = dailyTxList.map(tx => {
                const item = inventory.find(i => i.id === tx.itemId);
                const value = tx.qty * (item?.price || 0);
                
                if (tx.type === 'issue') dailyIssueCost += value;
                if (tx.type === 'waste') dailyWasteCost += value;
                if (tx.type === 'receive') dailyReceiveValue += value;
                
                return { ...tx, itemName: item?.name || 'ลบไปแล้ว', unit: item?.unit || '', value };
            });

            const dailyProfit = dailyRev - (dailyIssueCost + dailyWasteCost);

            const handleExportDaily = () => {
              let csvContent = "\uFEFF";
              
              csvContent += `รายงาน RESTCHEF ประจำวันที่,${dailyReportDate}\n\n`;
              csvContent += `สรุปผลประกอบการ\n`;
              csvContent += `ยอดขายรวม,${dailyRev} บาท\n`;
              csvContent += `ต้นทุนเบิกใช้ (หักออก),${dailyIssueCost} บาท\n`;
              csvContent += `ต้นทุนของเสีย (หักออก),${dailyWasteCost} บาท\n`;
              csvContent += `กำไรสุทธิ,${dailyProfit} บาท\n\n`;
              
              csvContent += `รายละเอียดการขาย\n`;
              csvContent += `ชื่อเมนู/รายการ,จำนวนที่ขายได้,มูลค่า (บาท)\n`;
              
              const salesMenuMap = {};
              dailySalesList.forEach(s => {
                  if (s.type === 'bulk' || !s.menuId) {
                      if(!salesMenuMap['bulk']) salesMenuMap['bulk'] = { name: 'ยอดขายรวมแบบเหมา (ไม่ระบุเมนู)', qty: '-', amount: 0 };
                      salesMenuMap['bulk'].amount += s.amount;
                  } else {
                      const menu = menus.find(m => m.id === s.menuId);
                      if (menu) {
                          if(!salesMenuMap[menu.id]) salesMenuMap[menu.id] = { name: menu.menu, qty: 0, amount: 0 };
                          salesMenuMap[menu.id].qty += s.qty;
                          salesMenuMap[menu.id].amount += s.amount;
                      }
                  }
              });
              Object.values(salesMenuMap).forEach(sm => {
                  csvContent += `${sm.name},${sm.qty},${sm.amount}\n`;
              });
              csvContent += `\n`;

              csvContent += `รายละเอียดความเคลื่อนไหวสต๊อก\n`;
              csvContent += `ประเภท,ชื่อวัตถุดิบ,จำนวน,หน่วย,มูลค่า (บาท),ผู้บันทึก,หมายเหตุ\n`;
              
              enrichedDailyTx.forEach(tx => {
                const typeLabel = tx.type === 'receive' ? 'รับเข้า' : tx.type === 'issue' ? 'เบิกใช้' : 'ของเสีย';
                const noteStr = tx.note ? tx.note.replace(/,/g, ' ') : '-'; 
                csvContent += `${typeLabel},${tx.itemName},${tx.qty},${tx.unit},${tx.value},${tx.person},${noteStr}\n`;
              });

              const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
              const url = URL.createObjectURL(blob);
              const link = document.createElement("a");
              link.setAttribute("href", url);
              link.setAttribute("download", `RESTCHEF_DailyReport_${dailyReportDate}.csv`);
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              
              showToast('ดาวน์โหลดไฟล์ข้อมูลรายวัน (CSV) สำเร็จ!');
            };

            const staffTransactions = transactions.filter(t => 
              t.date.startsWith(filterMonth) && 
              (reportStaffFilter === '' || t.person === reportStaffFilter)
            );

            let staffReceiveCost = 0, staffIssueCost = 0, staffWasteCost = 0;

            const enrichedStaffTx = staffTransactions.map(tx => {
              const item = inventory.find(i => i.id === tx.itemId);
              const value = tx.qty * (item?.price || 0);
              
              if (tx.type === 'receive') { staffReceiveCost += value; }
              if (tx.type === 'issue') { staffIssueCost += value; }
              if (tx.type === 'waste') { staffWasteCost += value; }
              
              return { ...tx, itemName: item?.name || 'ลบไปแล้ว', unit: item?.unit || '', value };
            });

              <div className="space-y-6 pb-20">

                  <button onClick={() => setFinanceTab('staff')} className={`whitespace-nowrap flex-1 py-3 px-2 text-sm font-medium border-b-2 transition-colors ${financeTab === 'staff' ? 'border-emerald-500 text-emerald-600' : 'border-transparent text-gray-500'}`}>สรุปพนักงาน</button>
                  <button onClick={() => setFinanceTab('sales')} className={`whitespace-nowrap flex-1 py-3 px-2 text-sm font-medium border-b-2 transition-colors ${financeTab === 'sales' ? 'border-emerald-500 text-emerald-600' : 'border-transparent text-gray-500'}`}>บันทึกยอดขาย</button>
                  <button onClick={() => setFinanceTab('foodcost')} className={`whitespace-nowrap flex-1 py-3 px-2 text-sm font-medium border-b-2 transition-colors ${financeTab === 'foodcost' ? 'border-emerald-500 text-emerald-600' : 'border-transparent text-gray-500'}`}>ต้นทุนเมนู</button>
                </div>

                  <div className="space-y-4">
                    <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center justify-between">

                      <div className="flex items-center space-x-2">
                        <input 
                          type="date" 
                          value={dailyReportDate}
                          onChange={(e) => setDailyReportDate(e.target.value)}
                          className="bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 p-2 outline-none"
                        />
                        <button 
                          onClick={handleExportDaily}
                          className="p-2 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 rounded-lg transition-colors border border-emerald-200"
                          title="ดาวน์โหลดไฟล์ Excel (CSV)"
                        >
                          <Download className="w-5 h-5" />
                        </button>
                      </div>
                    </div>

                      <h3 className="text-gray-500 text-xs font-bold uppercase tracking-wider mb-3">สรุปผลประกอบการ (P&L) ประจำวัน</h3>

                        <span className="text-gray-600">ยอดขายรวม</span>
                        <span className="font-bold text-blue-600">฿{dailyRev.toLocaleString()}</span>
                      </div>
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-gray-600">ต้นทุนเบิกใช้ (หักออก)</span>
                        <span className="font-semibold text-orange-500">- ฿{dailyIssueCost.toLocaleString()}</span>
                      </div>
                      <div className="flex justify-between items-center mb-4 pb-4 border-b border-gray-100">
                        <span className="text-gray-600">ต้นทุนของเสีย (หักออก)</span>
                        <span className="font-semibold text-red-500">- ฿{dailyWasteCost.toLocaleString()}</span>
                      </div>
                      <div className="flex justify-between items-center">
                        <span className="font-bold text-gray-800">กำไรสุทธิวันนี้</span>
                        <span className={`text-3xl font-black ${dailyProfit >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                          {dailyProfit >= 0 ? '+' : ''}฿{dailyProfit.toLocaleString()}
                        </span>
                      </div>
                    </div>

                    <div>
                      <h3 className="font-semibold text-gray-800 mb-3 ml-1 text-sm">ยอดขายวันนี้</h3>
                      {dailySalesList.length === 0 ? (
                        <div className="text-center text-gray-400 py-6 bg-white rounded-xl border border-gray-100 text-sm">ไม่มีบันทึกยอดขายในวันนี้</div>
                      ) : (
                        <div className="space-y-2">
                          {dailySalesList.map(sale => {
                            const isBulk = sale.type === 'bulk' || !sale.menuId;
                            const menu = isBulk ? null : menus.find(m => m.id === sale.menuId);
                            return (
                              <div key={sale.id} className="bg-white p-3 rounded-xl flex items-center justify-between border border-gray-100">
                                <div className="flex items-center">
                                  <div className={`p-2 rounded-full mr-3 ${isBulk ? 'bg-blue-50 text-blue-500' : 'bg-emerald-50 text-emerald-500'}`}>
                                    {isBulk ? <DollarSign className="w-4 h-4" /> : <ChefHat className="w-4 h-4" />}
                                  </div>
                                  <div>
                                    <div className="text-sm font-semibold text-gray-800">
                                      {isBulk ? 'ยอดขายรวม (ไม่ระบุเมนู)' : (menu?.menu || 'ลบไปแล้ว')}
                                    </div>
                                    <div className="text-[10px] text-gray-500 mt-0.5">
                                      {isBulk ? 'บันทึกแบบยอดเหมา' : `ขายได้ ${sale.qty} รายการ`}
                                    </div>
                                  </div>
                                </div>
                                <div className="text-right">
                                  <div className={`text-sm font-bold ${isBulk ? 'text-blue-600' : 'text-emerald-600'}`}>
                                    ฿{sale.amount.toLocaleString()}
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                    
                    <div>
                      <h3 className="font-semibold text-gray-800 mb-3 ml-1 text-sm mt-6">ความเคลื่อนไหวสต๊อกวันนี้</h3>
                      {enrichedDailyTx.length === 0 ? (
                        <div className="text-center text-gray-400 py-6 bg-white rounded-xl border border-gray-100 text-sm">ไม่มีการเบิก/รับ/ของเสียในวันนี้</div>
                      ) : (
                        <div className="space-y-2">
                          {enrichedDailyTx.map(tx => (
                            <div key={tx.id} className="bg-white p-3 rounded-xl flex items-center justify-between border border-gray-100">
                              <div className="flex items-center">
                                <div className={`p-2 rounded-full mr-3 ${tx.type === 'receive' ? 'bg-emerald-100 text-emerald-600' : tx.type === 'waste' ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600'}`}>
                                  {tx.type === 'receive' ? <TrendingUp className="w-4 h-4" /> : tx.type === 'waste' ? <Trash2 className="w-4 h-4" /> : <TrendingDown className="w-4 h-4" />}
                                </div>
                                <div>
                                  <div className="text-sm font-semibold text-gray-800">{tx.itemName} <span className="text-xs font-normal text-gray-500">({tx.qty} {tx.unit})</span></div>
                                  <div className="text-[10px] text-gray-500 mt-0.5">พนักงาน: {tx.person}</div>
                                  {tx.note && <div className="text-[10px] text-gray-400 mt-0.5 italic">"{tx.note}"</div>}
                                </div>
                              </div>
                              <div className="text-right">
                                <div className={`text-sm font-bold ${tx.type === 'receive' ? 'text-emerald-500' : tx.type === 'waste' ? 'text-red-500' : 'text-orange-500'}`}>
                                  {tx.type === 'receive' ? '' : '-'}฿{tx.value.toLocaleString()}
                                </div>
                                <div className="text-[10px] text-gray-400 font-medium">
                                  {tx.type === 'receive' ? 'มูลค่ารับเข้าสต๊อก' : tx.type === 'waste' ? 'มูลค่าของเสีย' : 'มูลค่าถูกเบิก'}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                ) : financeTab === 'staff' ? (
                  <div className="space-y-4">
                    <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 space-y-3">
                      <div className="flex items-center justify-between">
                        <span className="font-medium text-gray-700 flex items-center"><Calendar className="w-4 h-4 mr-2 text-blue-500"/> เดือน:</span>
                        <input 
                          type="month" 
                          value={filterMonth}
                          onChange={(e) => setFilterMonth(e.target.value)}
                          className="bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2 outline-none"
                        />
                      </div>
                      <div className="flex items-center justify-between border-t border-gray-100 pt-3">
                        <span className="font-medium text-gray-700 flex items-center"><Users className="w-4 h-4 mr-2 text-blue-500"/> พนักงาน:</span>
                        <select 
                          value={reportStaffFilter}
                          onChange={(e) => setReportStaffFilter(e.target.value)}
                          className="bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2 outline-none max-w-[150px]"
                        >
                          <option value="">-- ทุกคน --</option>
                          {staffList.map(staff => (
                            <option key={staff.id} value={staff.name}>{staff.name}</option>
                          ))}
                        </select>
                      </div>
                    </div>

                    <div className="grid grid-cols-3 gap-2">
                      <div className="bg-emerald-50 rounded-xl p-3 border border-emerald-100 text-center shadow-sm flex flex-col items-center justify-center h-full">
                        <div className="text-emerald-600 mb-1"><ShoppingBag className="w-5 h-5"/></div>
                        <div className="text-[10px] text-emerald-800/70 font-bold mb-1">รับเข้า (มูลค่า)</div>
                        <div className="text-sm font-black text-emerald-600">฿{staffReceiveCost.toLocaleString()}</div>
                      </div>
                      <div className="bg-orange-50 rounded-xl p-3 border border-orange-100 text-center shadow-sm flex flex-col items-center justify-center h-full">
                        <div className="text-orange-600 mb-1"><ArrowRightLeft className="w-5 h-5"/></div>
                        <div className="text-[10px] text-orange-800/70 font-bold mb-1">เบิกใช้ (มูลค่า)</div>
                        <div className="text-sm font-black text-orange-600">฿{staffIssueCost.toLocaleString()}</div>
                      </div>
                      <div className="bg-red-50 rounded-xl p-3 border border-red-100 text-center shadow-sm flex flex-col items-center justify-center h-full">
                        <div className="text-red-600 mb-1"><Trash2 className="w-5 h-5"/></div>
                        <div className="text-[10px] text-red-800/70 font-bold mb-1">ของเสีย (มูลค่า)</div>
                        <div className="text-sm font-black text-red-600">฿{staffWasteCost.toLocaleString()}</div>
                      </div>
                    </div>

                    <div>
                      <h3 className="font-semibold text-gray-800 mb-3 ml-1 text-sm">ประวัติการทำรายการ {reportStaffFilter ? `ของ ${reportStaffFilter}` : 'ทั้งหมด'}</h3>
                      {enrichedStaffTx.length === 0 ? (
                        <div className="text-center text-gray-400 py-6 bg-white rounded-xl border border-gray-100 text-sm">ไม่พบประวัติการทำรายการในเดือนนี้</div>
                      ) : (
                        <div className="space-y-2">
                          {enrichedStaffTx.map(tx => (
                            <div key={tx.id} className="bg-white p-3 rounded-xl flex items-center justify-between border border-gray-100 shadow-sm">
                              <div className="flex items-center">
                                <div className={`p-2 rounded-full mr-3 ${tx.type === 'receive' ? 'bg-emerald-100 text-emerald-600' : tx.type === 'waste' ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600'}`}>
                                  {tx.type === 'receive' ? <ShoppingBag className="w-4 h-4" /> : tx.type === 'waste' ? <Trash2 className="w-4 h-4" /> : <ArrowRightLeft className="w-4 h-4" />}
                                </div>
                                <div>
                                  <div className="text-sm font-semibold text-gray-800">{tx.itemName}</div>
                                  <div className="text-[10px] text-gray-500 mt-0.5">{tx.date} • {tx.person}</div>
                                  {tx.note && <div className="text-[10px] text-gray-400 mt-0.5 italic">"{tx.note}"</div>}
                                </div>
                              </div>
                              <div className="text-right">
                                <div className={`text-sm font-bold ${tx.type === 'receive' ? 'text-emerald-500' : tx.type === 'waste' ? 'text-red-500' : 'text-orange-500'}`}>
                                  {tx.qty} {tx.unit}
                                </div>
                                <div className="text-[10px] text-gray-400 font-medium mt-0.5">
                                  ฿{tx.value.toLocaleString()}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                ) : financeTab === 'sales' ? (
                  <div className="space-y-4">
                    <div className="flex bg-gray-100 p-1 rounded-xl">
                      <button onClick={() => setSaleInputType('menu')} className={`flex-1 py-2 text-sm font-medium rounded-lg ${saleInputType === 'menu' ? 'bg-white shadow-sm text-emerald-600' : 'text-gray-500'}`}><ChefHat className="w-4 h-4 inline mr-1" /> รายเมนู</button>
                      <button onClick={() => setSaleInputType('bulk')} className={`flex-1 py-2 text-sm font-medium rounded-lg ${saleInputType === 'bulk' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}><DollarSign className="w-4 h-4 inline mr-1" /> เหมา/ยอดรวม</button>
                    </div>
                    <form onSubmit={handleSaleSubmit} className="bg-white rounded-xl p-5 shadow-sm border border-emerald-100 space-y-4">
                       <div><label className="block text-sm text-gray-600 mb-1">วันที่</label><input type="date" required value={saleDate} onChange={(e) => setSaleDate(e.target.value)} className="w-full p-3 rounded-xl border border-gray-200 outline-none" /></div>
                       {saleInputType === 'menu' ? (
                          <div className="grid grid-cols-2 gap-4">
                            <div>
                              <label className="block text-sm text-gray-600 mb-1">เลือกเมนูอาหาร</label>
                              <select required value={saleMenuId} onChange={(e) => setSaleMenuId(e.target.value)} className="w-full p-3 rounded-xl border border-gray-200 outline-none bg-white">
                                <option value="">-- เลือกเมนู --</option>
                                {menus.map(m => <option key={m.id} value={m.id}>{m.menu} (฿{m.price})</option>)}
                              </select>
                            </div>
                            <div><label className="block text-sm text-gray-600 mb-1">จำนวน (จาน)</label><input type="number" required min="1" value={saleQty} onChange={(e) => setSaleQty(e.target.value)} className="w-full p-3 rounded-xl border border-gray-200 outline-none" placeholder="0" /></div>
                          </div>
                       ) : (
                          <div><label className="block text-sm text-gray-600 mb-1">ยอดขายรวมสุทธิ (บาท)</label><input type="number" required min="0" step="any" value={saleBulkAmount} onChange={(e) => setSaleBulkAmount(e.target.value)} className="w-full p-3 rounded-xl border border-gray-200 outline-none text-blue-600 font-bold text-lg" placeholder="0.00" /></div>
                       )}
                       <button type="submit" className={`w-full py-3 rounded-xl text-white font-medium ${saleInputType === 'menu' ? 'bg-emerald-500' : 'bg-blue-500'}`}>บันทึกยอดขาย</button>
                    </form>
                  </div>
                ) : (
                   <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                     <div className="flex justify-between items-center mb-4">
                       <h3 className="font-semibold text-gray-800 flex items-center text-sm"><ChefHat className="w-5 h-5 mr-2 text-emerald-500" /> สูตร (BOM)</h3>
                       <button onClick={() => setShowAddMenuModal(true)} className="text-xs bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-lg"><Plus className="w-3 h-3 inline" /> เพิ่มเมนู</button>
                     </div>
                     <div className="space-y-3">
                       {menus.map(menu => {
                          let dynamicCost = 0;
                          const recipeDetails = menu.recipe.map(r => {
                            const item = inventory.find(i => i.id === r.itemId);
                            dynamicCost += r.qty * (item?.price || 0);
                            return `${item?.name.split(' |')[0] || 'ไม่พบ'} (${r.qty})`;
                          });
                          const profitPercent = (((menu.price - dynamicCost) / menu.price) * 100).toFixed(0);
                          return (
                            <div key={menu.id} className="border border-gray-100 rounded-xl p-3 bg-gray-50/50">
                              <div className="flex justify-between items-start mb-2">
                                <div><div className="font-bold text-gray-800">{menu.menu}</div><div className="text-[10px] text-gray-500 mt-1"><b>สูตร:</b> {recipeDetails.join(' + ')}</div></div>
                                <div className="text-right text-sm font-bold">ขาย ฿{menu.price}</div>
                              </div>
                              <div className="grid grid-cols-2 gap-2 mt-3 pt-2 border-t border-gray-200 border-dashed text-xs">
                                <div><span className="text-gray-500">ต้นทุน: </span><span className="font-bold text-red-500">฿{dynamicCost.toLocaleString()}</span></div>
                                <div className="text-right"><span className="text-gray-500">กำไร: </span><span className={`font-bold ${profitPercent >= 40 ? 'text-emerald-500' : 'text-orange-500'}`}>฿{(menu.price-dynamicCost).toLocaleString()} ({profitPercent}%)</span></div>
                              </div>
                            </div>
                          );
                       })}
                     </div>
                   </div>
                )}
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-gray-50 font-sans text-gray-900 max-w-md mx-auto shadow-2xl relative overflow-hidden flex flex-col">
              {/* Toast Notification */}
              {notification.show && (
                <div className="absolute top-4 left-1/2 transform -translate-x-1/2 z-[100] w-[90%] max-w-sm">
                  <div className={`flex items-center p-4 rounded-xl shadow-lg border-l-4 ${notification.type === 'success' ? 'bg-emerald-50 border-emerald-500 text-emerald-800' : 'bg-red-50 border-red-500 text-red-800'}`}>
                    {notification.type === 'success' ? <CheckCircle2 className="w-5 h-5 mr-3" /> : <AlertTriangle className="w-5 h-5 mr-3" />}
                    <span className="text-sm font-semibold">{notification.message}</span>
                  </div>
                </div>
              )}

              {/* Header ร้านอาหาร (มีปุ่ม Logout มุมขวา) */}
              <div className="bg-white pt-10 pb-4 px-6 shadow-sm sticky top-0 z-10 flex justify-between items-center">
                <div>
                  <h1 className="text-xl font-black text-emerald-600 tracking-tight flex items-center">
                     <Store className="w-5 h-5 mr-2 text-emerald-500" />
                     {user.restaurantName}
                  </h1>
                  <p className="text-[10px] text-gray-500 font-medium mt-1">ผู้ใช้งาน: {user.name} ({isOwner ? 'Owner' : 'Staff'})</p>
                </div>
                <div className="flex items-center space-x-2">
                  {isOwner && (
                    <button onClick={() => setShowStaffModal(true)} className="p-2 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors" title="จัดการรายชื่อพนักงาน">
                      <Users className="w-5 h-5" />
                    </button>
                  )}
                  <button onClick={onLogout} className="p-2 text-gray-400 hover:text-red-500 transition-colors" title="ออกจากระบบ">
                     <LogOut className="w-5 h-5" />
                  </button>
                </div>
              </div>

              {/* Main Content */}
              <div className="flex-1 overflow-y-auto p-4">
                {activeTab === 'dashboard' && isOwner && renderDashboard()}
                {activeTab === 'inventory' && renderInventory()}
                {activeTab === 'transactions' && renderTransactions()}
                {activeTab === 'finance' && isOwner && renderFinance()}
              </div>

              {/* Bottom Navigation */}
              <div className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 px-2 py-3 flex justify-around items-center z-20 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                {isOwner && <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center p-2 flex-1 ${activeTab === 'dashboard' ? 'text-emerald-600' : 'text-gray-400'} `}><PieChart className="w-6 h-6 mb-1"/><span className="text-[10px] font-medium">ภาพรวม</span></button>}
                <button onClick={() => setActiveTab('inventory')} className={`flex flex-col items-center p-2 flex-1 ${activeTab === 'inventory' ? 'text-emerald-600' : 'text-gray-400'} `}><Package className="w-6 h-6 mb-1"/><span className="text-[10px] font-medium">สต๊อก</span></button>
                <button onClick={() => setActiveTab('transactions')} className={`flex flex-col items-center p-2 flex-1 ${activeTab === 'transactions' ? 'text-emerald-600' : 'text-gray-400'} `}><ArrowRightLeft className="w-6 h-6 mb-1"/><span className="text-[10px] font-medium">บันทึก</span></button>
                {isOwner && <button onClick={() => setActiveTab('finance')} className={`flex flex-col items-center p-2 flex-1 ${activeTab === 'finance' ? 'text-emerald-600' : 'text-gray-400'} `}><Banknote className="w-6 h-6 mb-1"/><span className="text-[10px] font-medium">การเงิน</span></button>}
              </div>

              {/* Modals */}
              {showEditMinModal && editingMinItem && (
                <div className="fixed inset-0 bg-gray-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl relative">
                    <h3 className="text-xl font-bold text-gray-800 mb-1">ตั้งค่าจุดสั่งซื้อ</h3>
                    <p className="text-sm text-gray-500 mb-4">กำหนดระดับสต๊อกขั้นต่ำสำหรับ "{editingMinItem.name}"</p>
                    <form onSubmit={handleSaveMin}>
                      <label className="block text-sm text-gray-600 mb-1">แจ้งเตือนเมื่อน้อยกว่า หรือ เท่ากับ ({editingMinItem.unit})</label>
                      <input type="number" autoFocus step="any" min="0" value={tempMinValue} onChange={(e) => setTempMinValue(e.target.value)} className="w-full p-4 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none text-xl font-bold text-blue-600 mb-6 text-center" />
                      <div className="flex space-x-3">
                        <button type="button" onClick={() => { setShowEditMinModal(false); setEditingMinItem(null); }} className="flex-1 py-3 bg-gray-100 text-gray-700 font-medium rounded-xl hover:bg-gray-200 transition-colors">ยกเลิก</button>
                        <button type="submit" className="flex-1 py-3 bg-blue-500 text-white font-medium rounded-xl hover:bg-blue-600 transition-colors shadow-lg shadow-blue-500/30">บันทึกค่า</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {itemToDelete && (
                <div className="fixed inset-0 bg-gray-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl relative text-center">
                    <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><AlertTriangle className="w-8 h-8" /></div>
                    <h3 className="text-xl font-bold text-gray-800 mb-2">ลบวัตถุดิบนี้?</h3>
                    <p className="text-sm text-gray-500 mb-6">คุณกำลังจะลบ <b>"{itemToDelete.name}"</b> ออกจากสต๊อกหลัก การกระทำนี้ไม่สามารถกู้คืนได้</p>
                    <div className="flex space-x-3">
                      <button onClick={() => setItemToDelete(null)} className="flex-1 py-3 bg-gray-100 text-gray-700 font-medium rounded-xl hover:bg-gray-200 transition-colors">ยกเลิก</button>
                      <button onClick={confirmDeleteItem} className="flex-1 py-3 bg-red-500 text-white font-medium rounded-xl hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">ยืนยันการลบ</button>
                    </div>
                  </div>
                </div>
              )}

              {showStaffModal && (
                <div className="fixed inset-0 bg-gray-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl relative max-h-[90vh] flex flex-col">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-xl font-bold text-gray-800 flex items-center"><Users className="w-5 h-5 mr-2 text-blue-500" /> จัดการผู้บันทึกระบบ</h3>
                      <button onClick={() => setShowStaffModal(false)} className="text-gray-400 hover:text-gray-600"><XCircle className="w-6 h-6" /></button>
                    </div>
                    <form onSubmit={handleAddStaff} className="flex mb-4">
                      <input type="text" value={newStaffName} onChange={(e) => setNewStaffName(e.target.value)} placeholder="เพิ่มชื่อพนักงานใหม่..." className="flex-1 p-2 rounded-l-xl border border-gray-200 focus:border-blue-500 focus:outline-none" />
                      <button type="submit" className="bg-blue-500 text-white px-4 rounded-r-xl font-medium hover:bg-blue-600 flex items-center"><UserPlus className="w-4 h-4 mr-1" /> เพิ่ม</button>
                    </form>
                    <div className="flex-1 overflow-y-auto bg-gray-50 rounded-xl border border-gray-100 p-2 space-y-2">
                      {staffList.map(staff => (
                        <div key={staff.id} className="flex justify-between items-center bg-white p-3 rounded-lg border border-gray-200">
                          <span className="font-medium text-gray-700">{staff.name}</span>
                          <button onClick={() => handleDeleteStaff(staff.id)} className="text-red-400 hover:text-red-600 bg-red-50 p-1.5 rounded-full"><Trash2 className="w-4 h-4" /></button>
                        </div>
                      ))}
                      {staffList.length === 0 && <div className="text-center text-gray-400 py-4 text-sm">ไม่มีรายชื่อพนักงาน</div>}
                    </div>
                  </div>
                </div>
              )}

              {showAddItemModal && (
                <div className="fixed inset-0 bg-gray-900/60 z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl p-6 w-full max-w-sm max-h-[90vh] overflow-y-auto">
                    <h3 className="text-xl font-bold mb-4">เพิ่มวัตถุดิบใหม่</h3>
                    <form onSubmit={handleAddItemSubmit} className="space-y-4">
                      <div><label className="block text-sm mb-1">ชื่อ</label><input type="text" required value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                      <div className="grid grid-cols-2 gap-2">
                        <div><label className="block text-sm mb-1">หน่วย</label><input type="text" required value={newItem.unit} onChange={e => setNewItem({...newItem, unit: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                        <div><label className="block text-sm mb-1">ราคา</label><input type="number" required value={newItem.price} onChange={e => setNewItem({...newItem, price: e.target.value})} className="w-full p-2 border rounded-lg" /></div>
                      </div>
                      <div><label className="block text-sm mb-1">ลิงก์รูปภาพ (URL)</label><input type="text" value={newItem.image} onChange={e => setNewItem({...newItem, image: e.target.value})} placeholder="https://..." className="w-full p-2 border rounded-lg" /></div>
                      <div className="flex space-x-2 pt-2">
                        <button type="button" onClick={() => setShowAddItemModal(false)} className="flex-1 p-2 bg-gray-100 rounded-lg">ยกเลิก</button>
                        <button type="submit" className="flex-1 p-2 bg-emerald-500 text-white rounded-lg">บันทึก</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
              
              {showAddMenuModal && (
                <div className="fixed inset-0 bg-gray-900/60 z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl p-6 w-full max-w-sm max-h-[90vh] overflow-y-auto">
                    <h3 className="text-xl font-bold mb-4">เพิ่มเมนูใหม่</h3>
                    <form onSubmit={handleSaveMenu} className="space-y-4">
                      <input type="text" required placeholder="ชื่อเมนู" value={newMenuData.menu} onChange={e => setNewMenuData({...newMenuData, menu: e.target.value})} className="w-full p-2 border rounded-lg" />
                      <input type="number" required placeholder="ราคาขาย" value={newMenuData.price} onChange={e => setNewMenuData({...newMenuData, price: e.target.value})} className="w-full p-2 border rounded-lg" />
                      <div className="pt-2 border-t">
                        <button type="button" onClick={() => setNewMenuData({...newMenuData, recipe: [...newMenuData.recipe, {itemId:'', qty:''}]})} className="text-sm bg-gray-100 px-2 py-1 rounded">เพิ่มส่วนผสม</button>
                        {newMenuData.recipe.map((r, idx) => (
                          <div key={idx} className="flex mt-2 space-x-1">
                             <select required value={r.itemId} onChange={(e) => { const newR = [...newMenuData.recipe]; newR[idx].itemId = e.target.value; setNewMenuData({...newMenuData, recipe: newR}) }} className="flex-1 p-1 border rounded text-sm">
                                <option value="">เลือก</option>{inventory.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                             </select>
                             <input type="number" required step="any" placeholder="จำนวน" value={r.qty} onChange={(e) => { const newR = [...newMenuData.recipe]; newR[idx].qty = e.target.value; setNewMenuData({...newMenuData, recipe: newR}) }} className="w-16 p-1 border rounded text-sm" />
                          </div>
                        ))}
                      </div>
                      <div className="flex space-x-2 pt-4">
                        <button type="button" onClick={() => setShowAddMenuModal(false)} className="flex-1 p-2 bg-gray-100 rounded-lg">ยกเลิก</button>
                        <button type="submit" className="flex-1 p-2 bg-emerald-500 text-white rounded-lg">บันทึก</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              <style dangerouslySetInnerHTML={{__html: `.pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }`}} />
            </div>
          );
        }

        // ============================================================================
        // 4. PLATFORM WRAPPER
        // ============================================================================

        function RestChefPlatform() {
          const [currentView, setCurrentView] = useState('landing');
          const [currentUser, setCurrentUser] = useState(null);

          const handleLogin = (user) => {
            setCurrentUser(user);
            if (user.role === 'superadmin') {
              setCurrentView('superadmin');
            } else {
              setCurrentView('restaurant');
            }
          };

          const handleLogout = () => {
            setCurrentUser(null);
            setCurrentView('landing');
          };

          const renderView = () => {
            if (currentView === 'landing') {
              return <LandingPage onLoginClick={() => setCurrentView('login')} />;
            }
            if (currentView === 'login') {
              return <LoginPage onLogin={handleLogin} onBack={() => setCurrentView('landing')} />;
            }
            if (currentView === 'superadmin' && currentUser) {
              return <SuperAdminDashboard user={currentUser} onLogout={handleLogout} />;
            }
            if (currentView === 'restaurant' && currentUser) {
              return <RestaurantApp user={currentUser} onLogout={handleLogout} />;
            }
            return null;
          };

          return renderView();
        }

        // ============================================================================
        // 5. RENDERING THE APP
        // ============================================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RestChefPlatform />);

    </script>
</body>
</html>
